site_name: exerplaza saml documentation

theme:
  name: material
  palette:
    primary: indigo
    accent: blue

markdown_extensions:
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

extra_javascript:
  - https://unpkg.com/mermaid/dist/mermaid.min.js

nav:
  - Home: index.md
  - My Involvement: involvement.md
  - Setup: setup.md
  - overview: doc-overview.md
  - implementation: doc-implementation.md
  - security: doc-security.md
